- name: Checkout
  uses: actions/checkout@v6

- name: Setup pnpm
  uses: pnpm/action-setup@v4

- name: Setup Node.js
  uses: actions/setup-node@v5
  with:
    node-version: 22
    cache: pnpm
    cache-dependency-path: pnpm-lock.yaml

- name: Install dependencies
  run: pnpm install --frozen-lockfile